<!DOCTYPE html>
<html lang="en" data-theme="dark" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Stella Giatsou | Personal Website</title>
    <!-- Font Awesome for Social Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Variables for easy theme switching */
        :root {
            /* Dark Mode (Default) */
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --secondary-text: #a1a1aa;
            --accent-color: #3b82f6;
            --transition-speed: 0.4s;
        }

        [data-theme="light"] {
            /* Light Mode Overrides */
            --bg-color: #f4f4f5;
            --text-color: #18181b;
            --secondary-text: #52525b;
            --accent-color: #2563eb;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background-color var(--transition-speed) ease, color var(--transition-speed) ease;
        }

        /* Theme Toggle Button */
        #theme-toggle {
            position: fixed;
            top: 30px;
            right: 30px;
            background: none;
            border: 1px solid var(--secondary-text);
            color: var(--text-color);
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 20px;
            font-size: 0.9rem;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.3s ease;
            z-index: 100;
        }

        #theme-toggle:hover {
            border-color: var(--text-color);
            transform: translateY(-2px);
        }

        .container {
            text-align: center;
        }

        /* Typewriter text */
        #typing-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 2rem;
            min-height: 1.2em;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            background-color: var(--text-color);
            margin-left: 5px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Social Icons */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .social-links.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .social-links a {
            color: var(--secondary-text);
            font-size: 1.8rem;
            text-decoration: none;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .social-links a:hover {
            color: var(--text-color);
            transform: scale(1.1);
        }

        @media (max-width: 600px) {
            #typing-text { font-size: 1.5rem; }
            #theme-toggle { top: 20px; right: 20px; font-size: 0.7rem; }
        }
        @media (max-width: 400px) {
            #typing-text { font-size: 0.8rem; }
            #theme-toggle { top: 20px; right: 20px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <button id="theme-toggle" aria-label="Toggle Light/Dark Mode">
        <i class="fas fa-moon"></i> <span id="mode-text">Dark</span>
    </button>

    <div class="container">
        <div id="typing-text"></div>
        <div class="social-links" id="social-container">
            <a href="https://www.linkedin.com/in/stellagiatsou/" target="_blank" title="LinkedIn">
                <i class="fab fa-linkedin"></i>
            </a>
            <a href="https://github.com/stellagiatsou?tab=repositories" target="_blank" title="GitHub">
                <i class="fab fa-github"></i>
            </a>
        </div>
    </div>

    <script>
        const textElement = document.getElementById('typing-text');
        const socialContainer = document.getElementById('social-container');
        const themeToggle = document.getElementById('theme-toggle');
        const modeText = document.getElementById('mode-text');
        const htmlElement = document.documentElement;
        
        const sentence = "Hey, I'm Stella, GenZ coder! // // always_keep_Ithaca_in_mind.js";
        const initialDelay = 2000; 
        const typingSpeed = 90;
        
        // Check for saved user preference
        const savedTheme = localStorage.getItem('theme') || 'dark';
        htmlElement.setAttribute('data-theme', savedTheme);
        updateToggleDetails(savedTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            htmlElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateToggleDetails(newTheme);
        });

        function updateToggleDetails(theme) {
            if (theme === 'dark') {
                themeToggle.innerHTML = '<i class="fas fa-moon"></i> Dark';
            } else {
                themeToggle.innerHTML = '<i class="fas fa-sun"></i> Light';
            }
        }

        function typeWriter(text, i, fnCallback) {
            if (i < text.length) {
                textElement.innerHTML = text.substring(0, i + 1) + '<span class="cursor">&nbsp;</span>';
                setTimeout(function() {
                    typeWriter(text, i + 1, fnCallback);
                }, typingSpeed);
            } else if (typeof fnCallback == 'function') {
                textElement.innerHTML = text + '<span class="cursor">&nbsp;</span>';
                setTimeout(fnCallback, 500);
            }
        }

        window.onload = function() {
            setTimeout(() => {
                typeWriter(sentence, 0, function() {
                    socialContainer.classList.add('visible');
                });
            }, initialDelay);
        };
    </script>
</body>
</html>
